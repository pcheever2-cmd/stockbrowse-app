# Cloudflare Workers configuration for Astro static site
name = "stockbrowse-app-pages"
compatibility_date = "2024-01-01"

[assets]
directory = "./dist"

# KV namespace for premium stock data (sharded per symbol as stock:AAPL etc.)
# Create with: wrangler kv namespace create STOCKS_PREMIUM_KV
# Then paste the id below.
[[kv_namespaces]]
binding = "STOCKS_PREMIUM_KV"
id = "a16202c79b5b4372b3a686d6a4f8baf1"

# Environment variables (non-secret, safe for config)
# Secret values (API keys) should be set via `wrangler secret put <NAME>`
# Required secrets:
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   RESEND_API_KEY (v2)
