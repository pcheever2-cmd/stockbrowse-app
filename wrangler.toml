# Cloudflare Pages configuration for Astro site with API functions
name = "stockbrowse-app-pages"
compatibility_date = "2025-01-01"
pages_build_output_dir = "./dist"

# KV namespace for premium stock data (sharded per symbol as stock:AAPL etc.)
[[kv_namespaces]]
binding = "STOCKS_PREMIUM_KV"
id = "a16202c79b5b4372b3a686d6a4f8baf1"

# Secret values should be set in the Cloudflare Pages dashboard:
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   RESEND_API_KEY (v2)
